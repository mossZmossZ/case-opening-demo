<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zenith Comp — Lucky Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
#root { width: 100%; height: 100%; }

:root {
  --nav:       #050D1A;
  --secondary: #0E1F38;
  --bg:        #070E1C;
  --surface:   rgba(255,255,255,0.04);
  --surface2:  rgba(255,255,255,0.07);
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --text:      #F0F4FF;
  --text2:     #8A9ABB;
  --text3:     #4A5A7A;
  --orange:    #E8611A;
  --orange2:   #FF7B3A;
  --orange-dim: rgba(232,97,26,0.18);
  --gold:      #F5C842;
  --purple:    #8B5CF6;
  --blue:      #3B82F6;
  --green:     #22C55E;
  --gray:      #4A5568;
  --c-common:    #5A6A8A;
  --c-rare:      #3B82F6;
  --c-epic:      #8B5CF6;
  --c-legendary: #F5C842;
  --font: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --r: 12px;
}

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(232,97,26,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(59,130,246,0.06) 0%, transparent 60%);
  font-family: var(--font);
}

/* Screens */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: scr-in 280ms cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes scr-in {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Grid noise overlay */
.screen::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* Typography */
.label { font-size:0.7rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--text2); }

/* Buttons */
.btn {
  font-family: var(--font); font-size:1rem; font-weight:700;
  letter-spacing:0.04em; height:54px; border:none; border-radius:var(--r);
  cursor:pointer; transition:all 180ms ease; position:relative; overflow:hidden;
}
.btn-primary {
  background: linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%);
  color:#000; width:100%;
  box-shadow: 0 0 0 0 rgba(232,97,26,0);
}
.btn-primary:hover:not(:disabled) {
  box-shadow: 0 0 32px rgba(232,97,26,0.35), 0 4px 16px rgba(0,0,0,0.4);
  transform: translateY(-1px);
}
.btn-primary:active:not(:disabled) { transform:translateY(0); }
.btn-primary:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; box-shadow:none; }
.btn-ghost {
  background: var(--surface); color:var(--text2); border:1px solid var(--border2);
  padding:0 20px;
}
.btn-ghost:hover { color:var(--orange); border-color:var(--orange); background:var(--orange-dim); }

/* Card */
.card {
  background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
  border:1px solid var(--border2); border-radius:16px;
  backdrop-filter: blur(12px);
}

/* Input */
input[type=text], input[type=password] {
  width:100%; height:54px; padding:0 18px;
  background:var(--surface); border:1px solid var(--border2);
  border-radius:var(--r); color:var(--text); font-family:var(--font);
  font-size:1rem; outline:none;
  transition:border-color 180ms, box-shadow 180ms;
}
input:focus {
  border-color:rgba(232,97,26,0.5);
  box-shadow:0 0 0 3px rgba(232,97,26,0.1);
}
input.err { border-color:rgba(239,68,68,0.7); animation: shake 300ms ease; }
input::placeholder { color:var(--text3); }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  25%      { transform:translateX(-6px); }
  75%      { transform:translateX(6px); }
}

/* Spinner */
.spin { width:18px;height:18px;border:2px solid rgba(0,0,0,0.2);border-top-color:#000;border-radius:50%;animation:ro 600ms linear infinite;display:inline-block; }
@keyframes ro { to { transform:rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* Reel */
.reel-wrap {
  position:relative; overflow:hidden;
  border-radius:16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
  border:1px solid var(--border2);
  height:168px;
}
.reel-track { display:flex; gap:10px; will-change:transform; }
.reel-card {
  flex-shrink:0; width:108px; height:148px;
  border-radius:10px; border:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; position:relative; overflow:hidden;
  background: linear-gradient(160deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  transition:border-color 200ms;
}
.reel-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 50%);
  pointer-events:none;
}
.reel-card.common   { border-color:rgba(90,106,138,0.3); }
.reel-card.rare     { border-color:rgba(59,130,246,0.3); }
.reel-card.epic     { border-color:rgba(139,92,246,0.3); }
.reel-card.legendary{ border-color:rgba(245,200,66,0.4); }
.reel-card.legendary .rc-icon { filter:drop-shadow(0 0 8px rgba(245,200,66,0.6)); }

/* Particles canvas */
#particles { position:fixed; inset:0; pointer-events:none; z-index:50; }

/* Topbar gradient */
.topbar {
  position:absolute; top:0; left:0; right:0; height:64px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px;
  border-bottom:1px solid var(--border);
  z-index:10;
}
.topbar::before {
  content:''; position:absolute; inset:0;
  background: linear-gradient(45deg, var(--nav) 0%, var(--secondary) 55%);
  z-index:-1;
}

/* Result animations */
@keyframes result-pop {
  0%   { opacity:0; transform:scale(0.88) translateY(20px); }
  70%  { transform:scale(1.02) translateY(-2px); }
  100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes tier-shine {
  0%,100% { opacity:0.4; }
  50%      { opacity:1; }
}
@keyframes float {
  0%,100% { transform:translateY(0px); }
  50%      { transform:translateY(-8px); }
}
@keyframes pulse-ring {
  0%   { transform:scale(0.8); opacity:0.6; }
  100% { transform:scale(2.2); opacity:0; }
}

/* Scan line on reel while spinning */
@keyframes scan {
  0%   { top:0; }
  100% { top:100%; }
}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Particles ─────────────────────────────────────────────────────────────── */
function burst(x, y, color, count = 32) {
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const particles = Array.from({length: count}, () => ({
    x, y,
    vx: (Math.random() - 0.5) * 14,
    vy: (Math.random() - 0.5) * 14 - 4,
    r: Math.random() * 4 + 2,
    alpha: 1,
    color,
  }));
  let frame;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.3; p.alpha -= 0.022;
      if (p.alpha <= 0) return;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    if (particles.some(p => p.alpha > 0)) frame = requestAnimationFrame(animate);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  cancelAnimationFrame(frame);
  animate();
}

/* ── Data ──────────────────────────────────────────────────────────────────── */
const TIER_META = {
  common:    { label:'Common',    color:'#5A6A8A', glow:'rgba(90,106,138,0.3)' },
  rare:      { label:'Rare',      color:'#3B82F6', glow:'rgba(59,130,246,0.35)' },
  epic:      { label:'Epic',      color:'#8B5CF6', glow:'rgba(139,92,246,0.4)' },
  legendary: { label:'Legendary', color:'#F5C842', glow:'rgba(245,200,66,0.45)' },
};
const TIER_ORDER = ['common','rare','epic','legendary'];

const PRIZES = [
  { id:'consolation', tier:'common',    name:'Better Luck!',  sub:'Keep trying',          weight:55 },
  { id:'sticker',     tier:'common',    name:'Sticker Set',   sub:'Exclusive designs',     weight:18 },
  { id:'tshirt',      tier:'rare',      name:'T-Shirt',       sub:'Premium cotton',        weight:12 },
  { id:'powerbank',   tier:'rare',      name:'Power Bank',    sub:'20,000 mAh',            weight:7  },
  { id:'hoodie',      tier:'epic',      name:'Hoodie',        sub:'Limited edition',       weight:5  },
  { id:'backpack',    tier:'epic',      name:'Backpack',      sub:'Tech carry',            weight:2  },
  { id:'swagbox',     tier:'legendary', name:'Swag Box',      sub:'Ultimate bundle',       weight:0.8},
  { id:'vip',         tier:'legendary', name:'VIP Upgrade',   sub:'All-access pass',       weight:0.2},
];

/* SVG prize icons */
const PRIZE_ICONS = {
  consolation: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="20" stroke="${c}" stroke-width="2" opacity="0.5"/>
    <path d="M22 32l6 6 14-14" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`,
  sticker: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 10l5 10 11 1.6-8 7.8 1.9 11L32 35l-9.9 5.4 1.9-11-8-7.8L27 20z" fill="${c}" opacity="0.85"/>
    <circle cx="32" cy="48" r="5" fill="${c}" opacity="0.5"/>
  </svg>`,
  tshirt: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 18l10-6s1 5 8 5 8-5 8-5l10 6-6 8h-5v20H23V26h-5z" fill="${c}" opacity="0.85"/>
    <path d="M14 18l10-6M50 18l-10-6" stroke="${c}" stroke-width="1.5"/>
  </svg>`,
  powerbank: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="14" y="20" width="36" height="24" rx="4" stroke="${c}" stroke-width="2" fill="${c}" fill-opacity="0.15"/>
    <rect x="50" y="27" width="4" height="10" rx="2" fill="${c}" opacity="0.6"/>
    <path d="M30 32l-4 6h8l-4 6" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`,
  hoodie: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 14c0 0-8 4-8 12v18h10V28h4v16h8V28h4v16h10V26c0-8-8-12-8-12s-2 8-10 8-10-8-10-8z" fill="${c}" opacity="0.85"/>
    <path d="M24 14s2 8 8 8 8-8 8-8" stroke="${c}" stroke-width="1.5" fill="none"/>
  </svg>`,
  backpack: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="16" y="20" width="32" height="32" rx="6" fill="${c}" opacity="0.85"/>
    <path d="M24 20v-4a8 8 0 0116 0v4" stroke="${c}" stroke-width="2" fill="none"/>
    <rect x="22" y="28" width="20" height="8" rx="3" fill="${c}" fill-opacity="0.3" stroke="${c}" stroke-width="1.5"/>
    <line x1="32" y1="36" x2="32" y2="52" stroke="${c}" stroke-width="1.5" opacity="0.4"/>
  </svg>`,
  swagbox: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 10L54 22v20L32 54 10 42V22z" fill="${c}" fill-opacity="0.2" stroke="${c}" stroke-width="1.5"/>
    <path d="M10 22l22 12 22-12M32 34v20" stroke="${c}" stroke-width="1.5"/>
    <circle cx="32" cy="22" r="5" fill="${c}" opacity="0.9"/>
  </svg>`,
  vip: (c) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M32 8l6 12 14 2-10 10 2 14-12-6-12 6 2-14L12 22l14-2z" fill="${c}" opacity="0.9"/>
    <circle cx="32" cy="32" r="22" stroke="${c}" stroke-width="1" opacity="0.3" stroke-dasharray="4 3"/>
  </svg>`,
};

function PrizeIcon({ prizeId, tier, size = 52 }) {
  const c = TIER_META[tier].color;
  const svg = PRIZE_ICONS[prizeId]?.(c) || PRIZE_ICONS.consolation(c);
  return <div dangerouslySetInnerHTML={{__html: svg}} style={{ width:size, height:size }} />;
}

function weightedRandom() {
  const total = PRIZES.reduce((s,p) => s + p.weight, 0);
  let r = Math.random() * total;
  for (const p of PRIZES) { r -= p.weight; if (r <= 0) return p; }
  return PRIZES[0];
}

const NAMES = ['Alex Chen','Sam Rivera','Jordan Lee','Morgan Kim','Casey Park','Taylor Nguyen','Riley Wu','Drew Patel','Kai Tanaka','Priya Sharma'];
const randomName = () => NAMES[Math.floor(Math.random() * NAMES.length)];

const ADMIN_CREDS = { user:'admin', pass:'zenith' };

/* ── Reel ──────────────────────────────────────────────────────────────────── */
const CARD_W = 108, CARD_GAP = 10, CARD_STEP = CARD_W + CARD_GAP;
const REEL_LEN = 64;

function buildReel(win) {
  const items = Array.from({length: REEL_LEN}, () => weightedRandom());
  const winIdx = REEL_LEN - 10;
  items[winIdx] = win;
  return { items, winIdx };
}

function ReelCardView({ prize, highlighted }) {
  const c = TIER_META[prize.tier].color;
  return (
    <div className={`reel-card ${prize.tier}`} style={{
      borderColor: highlighted ? c : undefined,
      boxShadow: highlighted ? `0 0 20px ${TIER_META[prize.tier].glow}, inset 0 0 20px ${TIER_META[prize.tier].glow}` : undefined,
    }}>
      <PrizeIcon prizeId={prize.id} tier={prize.tier} size={44} />
      <span style={{ fontFamily:'var(--mono)', fontSize:'0.6rem', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color: c, opacity:0.9 }}>
        {prize.label || TIER_META[prize.tier].label}
      </span>
    </div>
  );
}

/* ── Welcome ───────────────────────────────────────────────────────────────── */
function WelcomeScreen({ onStart }) {
  const [name, setName] = useState('');
  const [tries, setTries] = useState(3);
  const [loading, setLoading] = useState(false);
  const ref = useRef();
  useEffect(() => { ref.current?.focus(); }, []);

  const go = () => {
    if (!name.trim()) { ref.current?.focus(); return; }
    setLoading(true);
    setTimeout(() => onStart(name.trim(), tries), 400);
  };

  return (
    <div className="screen" data-screen-label="Welcome">
      <div style={{ position:'relative', zIndex:1, width:'100%', maxWidth:540, padding:'0 28px' }}>

        {/* Brand */}
        <div style={{ textAlign:'center', marginBottom:48 }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:10, marginBottom:20 }}>
            <div style={{
              width:36, height:36, borderRadius:8,
              background:'linear-gradient(135deg, var(--orange) 0%, var(--orange2) 100%)',
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 0 20px rgba(232,97,26,0.4)',
            }}>
              <span style={{ fontSize:'1rem', fontWeight:900, color:'#000', fontFamily:'var(--font)', letterSpacing:'-0.05em' }}>Z</span>
            </div>
            <div>
              <div style={{ fontSize:'0.85rem', fontWeight:700, color:'var(--text)', letterSpacing:'0.02em' }}>Zenith Comp Co., Ltd.</div>
              <div style={{ fontSize:'0.65rem', fontWeight:500, color:'var(--text2)', letterSpacing:'0.12em', textTransform:'uppercase' }}>Lucky Draw</div>
            </div>
          </div>

          <h1 style={{
            fontSize:'clamp(2.8rem,6vw,5.5rem)', fontWeight:900, lineHeight:1.0,
            letterSpacing:'-0.04em', color:'var(--text)',
            textShadow:'0 0 60px rgba(232,97,26,0.2)',
          }}>
            OPEN YOUR<br />
            <span style={{
              background:'linear-gradient(90deg, var(--orange) 0%, var(--orange2) 50%, var(--gold) 100%)',
              WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text',
            }}>CASE</span>
          </h1>
          <p style={{ marginTop:16, fontSize:'0.9rem', color:'var(--text2)', lineHeight:1.6 }}>
            Enter your name and spin the reel to discover your reward.
          </p>
        </div>

        {/* Form */}
        <div className="card" style={{ padding:'28px 28px 24px' }}>
          <div style={{ display:'flex', gap:10, marginBottom:20 }}>
            <input ref={ref} type="text" placeholder="Your full name" value={name}
              onChange={e => setName(e.target.value)} onKeyDown={e => e.key==='Enter' && go()} maxLength={40} />
            <button className="btn btn-ghost" onClick={() => setName(randomName())} style={{ height:54, flexShrink:0, fontSize:'0.85rem', fontWeight:600, padding:'0 16px', borderRadius:12 }}>
              Random
            </button>
          </div>

          <div style={{ marginBottom:24 }}>
            <p className="label" style={{ marginBottom:12 }}>Number of attempts</p>
            <div style={{ display:'flex', gap:8 }}>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => setTries(n)} style={{
                  flex:1, height:48, border:`1px solid ${tries===n ? 'var(--orange)' : 'var(--border)'}`,
                  borderRadius:8, background: tries===n ? 'var(--orange-dim)' : 'var(--surface)',
                  color: tries===n ? 'var(--orange)' : 'var(--text2)',
                  fontFamily:'var(--mono)', fontSize:'1.1rem', fontWeight:700, cursor:'pointer',
                  transition:'all 150ms',
                  boxShadow: tries===n ? '0 0 12px rgba(232,97,26,0.2)' : 'none',
                }}>
                  {n}
                </button>
              ))}
            </div>
          </div>

          <button className="btn btn-primary" onClick={go} disabled={!name.trim() || loading} style={{ borderRadius:12, fontSize:'1rem', fontWeight:800, letterSpacing:'0.08em' }}>
            {loading ? <span className="spin" /> : 'BEGIN'}
          </button>
        </div>

        {/* Prize preview strip */}
        <div style={{ marginTop:24, display:'flex', gap:8, justifyContent:'center', alignItems:'center' }}>
          {PRIZES.filter(p => p.id !== 'consolation').map(p => (
            <div key={p.id} style={{ display:'flex', alignItems:'center', gap:5 }} title={p.name}>
              <div style={{ width:6, height:6, borderRadius:'50%', background: TIER_META[p.tier].color, flexShrink:0 }} />
            </div>
          ))}
          <span style={{ fontSize:'0.7rem', color:'var(--text3)', marginLeft:4 }}>7 prizes available</span>
        </div>

        {/* Admin */}
        <p style={{ textAlign:'center', marginTop:28, fontSize:'0.7rem', color:'var(--text3)', cursor:'pointer', letterSpacing:'0.06em' }}
           onClick={() => onStart(null, null, true)}>
          ADMIN →
        </p>
      </div>
    </div>
  );
}

/* ── Game ──────────────────────────────────────────────────────────────────── */
function GameScreen({ playerName, attemptsLeft, totalAttempts, onResult }) {
  const [phase, setPhase] = useState('idle');
  const [reelItems, setReelItems] = useState(() => Array.from({length:20}, weightedRandom));
  const [winPrize, setWinPrize] = useState(null);
  const trackRef = useRef();
  const winIdxRef = useRef(0);

  const open = useCallback(() => {
    const prize = weightedRandom();
    setWinPrize(prize);
    const { items, winIdx } = buildReel(prize);
    winIdxRef.current = winIdx;
    setReelItems(items);
    setPhase('spinning');

    requestAnimationFrame(() => requestAnimationFrame(() => {
      if (!trackRef.current) return;
      const vw = trackRef.current.parentElement?.offsetWidth || 860;
      const center = vw / 2 - CARD_W / 2;
      const target = -(winIdx * CARD_STEP - center);
      trackRef.current.style.transition = 'none';
      trackRef.current.style.transform = 'translateX(0)';
      requestAnimationFrame(() => {
        trackRef.current.style.transition = 'transform 3800ms cubic-bezier(0.08,1,0.2,1)';
        trackRef.current.style.transform = `translateX(${target}px)`;
      });
    }));

    setTimeout(() => {
      // burst particle at center of reel
      const reelEl = document.querySelector('.reel-wrap');
      if (reelEl) {
        const r = reelEl.getBoundingClientRect();
        burst(r.left + r.width/2, r.top + r.height/2, TIER_META[prize.tier].color, prize.tier === 'legendary' ? 60 : prize.tier === 'epic' ? 44 : 28);
      }
      setPhase('done');
      setTimeout(() => onResult(prize), 500);
    }, 3900);
  }, [onResult]);

  const isSpinning = phase === 'spinning';

  return (
    <div className="screen" data-screen-label="Game" style={{ justifyContent:'flex-start' }}>

              width:CARD_W+8, height:CARD_W+32, border:`2px solid rgba(232,97,26,0.4)`,
              borderRadius:12, pointerEvents:'none',

        {/* Prize legend */}

                  <span style={{ fontSize:'0.85rem', color:'var(--text2)' }}>{h.name}</span>
                  <span style={{ fontSize:'0.8rem', fontWeight:700, color:TIER_META[h.tier].color }}>{TIER_META[h.tier].label}</span>
                  <span style={{ fontFamily:'var(--mono)', fontSize:'0.7rem', color:'var(--text3)' }}>{h.time}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function AdminLogin({ onLogin, onBack }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [error, setError] = useState(false);
  const ref = useRef();
  useEffect(() => { ref.current?.focus(); }, []);
  const attempt = () => {
    if (user === ADMIN_CREDS.user && pass === ADMIN_CREDS.pass) onLogin();
    else { setError(true); setTimeout(() => setError(false), 700); }
  };
  return (
    <div className="screen" data-screen-label="Admin Login">
      <div style={{ position:'relative', zIndex:1, width:'100%', maxWidth:380, padding:'0 24px' }}>
        <p className="label" style={{ textAlign:'center', marginBottom:32 }}>Admin Access</p>
        <div className="card" style={{ padding:28 }}>
          <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:16 }}>
            <input ref={ref} type="text" placeholder="Username" value={user} onChange={e=>setUser(e.target.value)} className={error?'err':''} onKeyDown={e=>e.key==='Enter'&&attempt()} />
            <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} className={error?'err':''} onKeyDown={e=>e.key==='Enter'&&attempt()} />
          </div>
          <button className="btn btn-primary" onClick={attempt} style={{ borderRadius:10, fontWeight:700, marginBottom:10 }}>SIGN IN</button>
          <button className="btn btn-ghost" onClick={onBack} style={{ width:'100%', borderRadius:10 }}>← Back</button>
          <p style={{ textAlign:'center', marginTop:14, fontFamily:'var(--mono)', fontSize:'0.65rem', color:'var(--text3)' }}>admin / zenith</p>
        </div>
      </div>
    </div>
  );
}

/* ── App ───────────────────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#8B5CF6"
}/*EDITMODE-END*/;

function App() {
  const [tweakOpen, setTweakOpen] = useState(false);
  const [screen, setScreen] = useState('welcome');
  const [playerName, setPlayerName] = useState('');
  const [totalAttempts, setTotalAttempts] = useState(3);
  const [attemptsLeft, setAttemptsLeft] = useState(3);
  const [history, setHistory] = useState([]);
  const [lastPrize, setLastPrize] = useState(null);
  const [adminAuthed, setAdminAuthed] = useState(false);

  useEffect(() => {
    const h = (e) => {
      if (e.data?.type==='__activate_edit_mode') setTweakOpen(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweakOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const handleStart = (name, tries, goAdmin=false) => {
    if (goAdmin) { setScreen('admin-login'); return; }
    setPlayerName(name); setTotalAttempts(tries); setAttemptsLeft(tries); setHistory([]); setScreen('game');
  };

  const handleResult = (prize) => {
    setLastPrize(prize);
    setHistory(h => [...h, prize]);
    setAttemptsLeft(a => a - 1);
    setScreen('result');
  };

  const handleContinue = () => {
    if (attemptsLeft <= 0) setScreen('summary');
    else setScreen('game');
  };

  return (
    <div style={{ width:'100%', height:'100%', position:'relative' }}>
      {screen==='welcome'    && <WelcomeScreen onStart={handleStart} />}
      {screen==='game'       && <GameScreen key={`g${history.length}`} playerName={playerName} attemptsLeft={attemptsLeft} totalAttempts={totalAttempts} onResult={handleResult} />}
      {screen==='result'     && lastPrize && <ResultScreen key={`r${history.length}`} prize={lastPrize} attemptsLeft={attemptsLeft} onContinue={handleContinue} />}
      {screen==='summary'    && <SummaryScreen playerName={playerName} history={history} onPlayAgain={() => setScreen('welcome')} />}
      {screen==='admin-login'&& <AdminLogin onLogin={() => { setAdminAuthed(true); setScreen('admin'); }} onBack={() => setScreen('welcome')} />}
      {screen==='admin'      && adminAuthed && <AdminDashboard onLogout={() => { setAdminAuthed(false); setScreen('welcome'); }} />}

      {tweakOpen && (
        <div style={{ position:'fixed', bottom:24, right:24, background:'var(--secondary)', border:'1px solid var(--border2)', borderRadius:14, padding:24, width:260, zIndex:200, fontFamily:'var(--font)', boxShadow:'0 12px 48px rgba(0,0,0,0.7)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
            <span className="label">Tweaks</span>
            <button onClick={()=>setTweakOpen(false)} style={{ background:'none',border:'none',color:'var(--text2)',cursor:'pointer',fontSize:'1rem' }}>✕</button>
          </div>
          <div style={{ marginBottom:16 }}>
            <p className="label" style={{ marginBottom:10 }}>Accent Color</p>
            <div style={{ display:'flex', gap:8 }}>
              {['#E8611A','#3B82F6','#22C55E','#8B5CF6','#F5C842'].map(c => (
                <div key={c} onClick={() => { document.documentElement.style.setProperty('--orange', c); window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:c}},'*'); }}
                  style={{ width:28,height:28,borderRadius:8,background:c,cursor:'pointer',border:'2px solid rgba(255,255,255,0.2)',boxSizing:'border-box' }} />
              ))}
            </div>
          </div>
          <div style={{ paddingTop:14, borderTop:'1px solid var(--border)', fontSize:'0.7rem', color:'var(--text3)', lineHeight:1.7 }}>
            <b style={{color:'var(--text2)'}}>Flow:</b> Welcome → Game → Result → Summary<br/>
            <b style={{color:'var(--text2)'}}>Admin:</b> admin / zenith
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
