services:

  # ── React frontend served by nginx ──────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - game-service
      - admin-service
    restart: unless-stopped

  # ── Auth Service (JWT login / verify) ───────────────────────────────────────
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    expose:
      - "4001"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4001
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ── Game Service (sessions, players, spin orchestration) ────────────────────
  game-service:
    build:
      context: ./services/game-service
      dockerfile: Dockerfile
    expose:
      - "4002"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_game
      REDIS_URL: redis://redis:6379
      PRIZE_SERVICE_URL: http://prize-service:4004
      PORT: 4002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      prize-service:
        condition: service_started
    restart: unless-stopped

  # ── Admin Service (BFF / orchestrator — no database) ────────────────────────
  admin-service:
    build:
      context: ./services/admin-service
      dockerfile: Dockerfile
    expose:
      - "4003"
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      GAME_SERVICE_URL: http://game-service:4002
      PRIZE_SERVICE_URL: http://prize-service:4004
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-zenith-prizes}
      PORT: 4003
    depends_on:
      - auth-service
      - game-service
      - prize-service
    restart: unless-stopped

  # ── Prize Service (internal only — prize CRUD, spin engine) ─────────────────
  prize-service:
    build:
      context: ./services/prize-service
      dockerfile: Dockerfile
    expose:
      - "4004"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_prize
      REDIS_URL: redis://redis:6379
      PORT: 4004
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo-data:
  redis-data:
