services:

  # ── React frontend — pull from Docker Hub ───────────────────────────────────
  client:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-client:${IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - game-service
      - admin-service
    restart: always

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-auth-service:${IMAGE_TAG:-latest}
    expose:
      - "4001"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_auth
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4001
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always

  # ── Game Service ────────────────────────────────────────────────────────────
  game-service:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-game-service:${IMAGE_TAG:-latest}
    expose:
      - "4002"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_game
      REDIS_URL: redis://redis:6379
      PRIZE_SERVICE_URL: http://prize-service:4004
      PORT: 4002
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      prize-service:
        condition: service_started
    restart: always

  # ── Admin Service ───────────────────────────────────────────────────────────
  admin-service:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-admin-service:${IMAGE_TAG:-latest}
    expose:
      - "4003"
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      GAME_SERVICE_URL: http://game-service:4002
      PRIZE_SERVICE_URL: http://prize-service:4004
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-zenith-prizes}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      MINIO: ${MINIO:-false}
      PORT: 4003
    depends_on:
      - auth-service
      - game-service
      - prize-service
    restart: always

  # ── Prize Service (internal only) ───────────────────────────────────────────
  prize-service:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-prize-service:${IMAGE_TAG:-latest}
    expose:
      - "4004"
    environment:
      MONGO_URI: mongodb://mongodb:27017/zenith_prize
      REDIS_URL: redis://redis:6379
      PORT: 4004
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo-data:
  redis-data:
