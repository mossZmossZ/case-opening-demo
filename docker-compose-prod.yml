services:

  # ── React frontend — pull from Docker Hub ───────────────────────────────────
  client:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-client:${IMAGE_TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_started
    restart: always

  # ── Express API server — pull from Docker Hub ────────────────────────────────
  server:
    image: ${DOCKERHUB_USERNAME}/case-opening-demo-server:${IMAGE_TAG:-latest}
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/zenith
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    # Port NOT exposed externally in prod — only reachable inside Docker network
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
