name: Release — Build, Scan & Push to Docker Hub

# Triggered on every push to main or Development.
# Tags images with the commit SHA (primary, immutable — used by GitOps) and
# a floating <branch>-latest tag. No semver tags.
#
# Flow per service (matrix):
#   1. buildx build   → load locally
#   2. Trivy scan     → fails job on HIGH/CRITICAL (gate)
#   3. docker push    → only if scan passed
#
# After all services finish, a summary job aggregates the image refs into
# image-refs.json (artifact) for the downstream GitOps repo to consume.

on:
  push:
    branches: [main, Development]

# Let back-to-back pushes each finish (they produce distinct sha tags), but
# serialize per branch so the floating <branch>-latest tag isn't raced.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  REGISTRY: docker.io
  REGISTRY_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-scan-push:
    name: ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: client,        context: ./client,                     image: case-opening-demo-client }
          - { name: auth-service,  context: ./services/auth-service,      image: case-opening-demo-auth-service }
          - { name: game-service,  context: ./services/game-service,      image: case-opening-demo-game-service }
          - { name: admin-service, context: ./services/admin-service,     image: case-opening-demo-admin-service }
          - { name: prize-service, context: ./services/prize-service,     image: case-opening-demo-prize-service }
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag values
        id: vars
        run: |
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          BRANCH="${GITHUB_REF_NAME}"
          IMAGE="${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ matrix.service.image }}"
          echo "sha_short=${SHORT_SHA}"             >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"                   >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}"                     >> "$GITHUB_OUTPUT"
          echo "tag_sha=${IMAGE}:sha-${SHORT_SHA}"  >> "$GITHUB_OUTPUT"
          echo "tag_branch=${IMAGE}:${BRANCH}-latest" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local — for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          load: true
          tags: local/${{ matrix.service.image }}:scan
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

      - name: Trivy scan — gate on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: local/${{ matrix.service.image }}:scan
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
          format: table

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag & push
        id: push
        run: |
          set -euo pipefail
          docker tag  local/${{ matrix.service.image }}:scan ${{ steps.vars.outputs.tag_sha }}
          docker tag  local/${{ matrix.service.image }}:scan ${{ steps.vars.outputs.tag_branch }}
          docker push ${{ steps.vars.outputs.tag_sha }}
          docker push ${{ steps.vars.outputs.tag_branch }}
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.vars.outputs.tag_sha }} | cut -d@ -f2)"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Write per-service ref fragment
        run: |
          mkdir -p refs
          cat > refs/${{ matrix.service.name }}.json <<EOF
          {
            "service":  "${{ matrix.service.name }}",
            "image":    "${{ steps.vars.outputs.image }}",
            "tag":      "sha-${{ steps.vars.outputs.sha_short }}",
            "ref":      "${{ steps.vars.outputs.tag_sha }}",
            "digest":   "${{ steps.push.outputs.digest }}",
            "pinned":   "${{ steps.vars.outputs.image }}@${{ steps.push.outputs.digest }}"
          }
          EOF

      - name: Upload ref fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: refs-${{ matrix.service.name }}
          path: refs/${{ matrix.service.name }}.json
          retention-days: 30

      - name: Append to job summary
        run: |
          {
            echo "### ${{ matrix.service.name }}"
            echo ""
            echo "| field | value |"
            echo "|-------|-------|"
            echo "| image   | \`${{ steps.vars.outputs.image }}\` |"
            echo "| sha tag | \`sha-${{ steps.vars.outputs.sha_short }}\` |"
            echo "| digest  | \`${{ steps.push.outputs.digest }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Aggregate per-service refs into one image-refs.json for GitOps ────────
  publish-refs:
    name: Publish image-refs.json
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Download all ref fragments
        uses: actions/download-artifact@v4
        with:
          pattern: refs-*
          path: refs
          merge-multiple: true

      - name: Combine into image-refs.json
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo '${{ github.sha }}' | cut -c1-7)"
          jq -s \
            --arg sha      "${{ github.sha }}" \
            --arg shaShort "$SHORT_SHA" \
            --arg branch   "${GITHUB_REF_NAME}" \
            --arg repo     "${{ github.repository }}" \
            --arg runUrl   "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
               commit:   $sha,
               commit7:  $shaShort,
               branch:   $branch,
               repo:     $repo,
               runUrl:   $runUrl,
               services: .
             }' refs/*.json > image-refs.json
          cat image-refs.json

      - name: Upload image-refs.json
        uses: actions/upload-artifact@v4
        with:
          name: image-refs
          path: image-refs.json
          retention-days: 90

      - name: Summary
        run: |
          {
            echo "## 📦 GitOps image refs"
            echo ""
            echo "Download \`image-refs\` artifact and feed it to the GitOps repo workflow."
            echo ""
            echo '```json'
            cat image-refs.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
