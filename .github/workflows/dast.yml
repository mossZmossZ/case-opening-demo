name: DAST — OWASP ZAP Baseline

# Manual pipeline. Pulls images from Docker Hub, boots the prod compose
# stack, runs the OWASP ZAP baseline scanner (passive, non-intrusive) against
# the frontend URL, uploads the HTML/MD report as an artifact.
#
# No extra secrets needed.

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag to scan (e.g. sha-abc1234 or main-latest)'
        required: true
        default: 'main-latest'

permissions:
  contents: read
  issues: write   # zap action can open issues on findings (we disable below)

jobs:
  zap:
    name: ZAP baseline (tag=${{ inputs.image_tag }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Write .env for docker compose
        run: |
          cat > .env <<EOF
          DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG=${{ inputs.image_tag }}
          JWT_SECRET=ci-dast-not-a-real-secret
          EOF

      - name: Start stack
        run: docker compose -f docker-compose-prod.yml up -d

      - name: Wait for frontend
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:8080/api/game/stats >/dev/null; then
              echo "stack ready"; exit 0
            fi
            sleep 2
          done
          echo "stack did not become ready"; docker compose -f docker-compose-prod.yml logs --tail=200; exit 1

      - name: OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          # Report artifacts are attached automatically by the action.
          # Keep it report-only (no GitHub issue spam); the job stays green
          # unless ZAP itself errors, and you review the report manually.
          allow_issue_writing: false
          fail_action: false
          cmd_options: '-a'   # include alpha passive rules

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f docker-compose-prod.yml logs --tail=300

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose-prod.yml down -v
