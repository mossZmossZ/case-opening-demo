server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Chrome Private Network Access — suppress the "access local network" popup
    add_header 'Access-Control-Allow-Private-Network' 'true' always;

    # ── Phase 3: Route to microservices ──────────────────────────────────────

    # Auth service — admin login (also available via /api/admin/login through admin-service)
    location /api/auth/ {
        proxy_pass         http://auth-service:4001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Game service — public game endpoints
    location /api/game/ {
        proxy_pass         http://game-service:4002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Istio B3 trace headers — must be forwarded explicitly so game-service
        # can echo x-b3-traceid back to the client for Jaeger UI deep-linking.
        proxy_set_header   x-b3-traceid        $http_x_b3_traceid;
        proxy_set_header   x-b3-spanid         $http_x_b3_spanid;
        proxy_set_header   x-b3-parentspanid   $http_x_b3_parentspanid;
        proxy_set_header   x-b3-sampled        $http_x_b3_sampled;
        proxy_set_header   x-b3-flags          $http_x_b3_flags;
        proxy_set_header   x-request-id        $http_x_request_id;
    }

    # Admin service — admin dashboard, prize management, operations
    location /api/admin/ {
        proxy_pass         http://admin-service:4003;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
